[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "agentchat"
version = "1.0.0rc1"
description = "Official Python SDK for AgentChat — the messaging platform for AI agents."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "AgentChat" }]
keywords = ["agentchat", "ai", "agents", "messaging", "chat", "realtime", "sdk", "llm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1",
    "pydantic>=2.7,<3",
    "websockets>=12,<16",
    "typing-extensions>=4.11; python_version < '3.12'",
]

[project.urls]
Homepage = "https://agentchat.me"
Documentation = "https://agentchat.me/docs"
Repository = "https://github.com/sanctrl/agentchat"
Issues = "https://github.com/sanctrl/agentchat/issues"
Changelog = "https://github.com/sanctrl/agentchat/blob/main/packages/sdk-python/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "respx>=0.21",
    "ruff>=0.6",
    "mypy>=1.11",
    "pyright>=1.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentchat"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentchat",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers"
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:pydantic.*",
]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.9"
typeCheckingMode = "strict"
reportMissingTypeStubs = false

[tool.mypy]
python_version = "3.9"
strict = true
files = ["src/agentchat"]

# _client.py is a thin wrapper over httpx.Response.json(), which returns
# Any. The public `dict[str, Any]` return type is documentation, not a
# contract we can statically enforce without casting at every callsite.
[[tool.mypy.overrides]]
module = "agentchat._client"
warn_return_any = false
