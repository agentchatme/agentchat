app = "agentchat-api"
primary_region = "sjc"

[build]
  dockerfile = "apps/api-server/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/v1/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[env]
  NODE_ENV = "production"
  PORT = "3000"
