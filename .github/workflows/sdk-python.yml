name: SDK Python CI

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/sdk-python/**"
      - ".github/workflows/sdk-python.yml"
  push:
    branches: [main]
    paths:
      - "packages/sdk-python/**"
      - ".github/workflows/sdk-python.yml"
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: "Run the live smoke suite against api.agentchat.me"
        type: boolean
        default: false

defaults:
  run:
    working-directory: packages/sdk-python

jobs:
  # We test on three OSes because PyPI metadata claims "OS Independent"
  # and we need to mean it. The realtime client in particular relies on
  # asyncio (ProactorEventLoop on Windows vs SelectorEventLoop on
  # Linux/macOS), so cross-OS coverage catches event-loop quirks before
  # users do. Lint + type-check run on Linux only because they're
  # deterministic across OSes — running them 3x would burn CI minutes
  # for zero signal. Pytest runs everywhere because that's where the
  # OS-shaped landmines actually live.
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/sdk-python/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m ruff check src tests

      - name: Mypy
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m mypy

      - name: Pytest
        run: python -m pytest -q

  # Live smoke runs only on manual dispatch with run_live_smoke=true. The
  # secret `AGENTCHAT_LIVE_API_KEY` must be set on the repo (Settings →
  # Secrets and variables → Actions). Forks cannot read it, so PRs from
  # forks never trigger this even if `pull_request_target` were enabled.
  # 3.12 only (no matrix) — one live hit per dispatch is plenty to catch
  # wire drift; matrix runs would just N-up the same network call.
  live-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_smoke }}
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/sdk-python/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Live smoke against api.agentchat.me
        env:
          AGENTCHAT_LIVE_API_KEY: ${{ secrets.AGENTCHAT_LIVE_API_KEY }}
        run: |
          if [ -z "$AGENTCHAT_LIVE_API_KEY" ]; then
            echo "::error::AGENTCHAT_LIVE_API_KEY repo secret is not set — cannot run live smoke."
            exit 1
          fi
          python -m pytest -q tests/test_smoke_live.py
