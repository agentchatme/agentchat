name: Publish SDK Python

# Two ways to publish:
#
#   1. Push a tag matching ``python-sdk-v*``  → publishes to PyPI.
#      The tag name carries the version (e.g. ``python-sdk-v1.0.0``); the
#      workflow does not parse it, the version is read from
#      ``packages/sdk-python/_version.py`` so the SemVer source of truth
#      stays in the package itself.
#
#   2. Manual ``workflow_dispatch`` with ``target=test``  → uploads to
#      TestPyPI for a dry-run install. Use this before the first real
#      publish, or whenever the build pipeline itself has changed.
#
# Auth uses PyPI / TestPyPI Trusted Publishers (OIDC) — there is NO
# long-lived ``PYPI_API_TOKEN`` in repo secrets. Each environment
# (``pypi`` and ``testpypi``) is configured at:
#   https://pypi.org/manage/account/publishing/
#   https://test.pypi.org/manage/account/publishing/
# bound to this repo + workflow filename + the corresponding GitHub
# environment name. A secret leak therefore cannot mint PyPI uploads.

on:
  push:
    tags:
      - "python-sdk-v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        required: true
        default: test
        options: [test, prod]

defaults:
  run:
    working-directory: packages/sdk-python

jobs:
  # Block the publish behind a green run of the same checks the regular
  # CI runs on PR. We re-run rather than relying on a prior status
  # because the tag commit may not have been pushed through CI yet —
  # someone could tag a feature branch directly and skip the main-branch
  # CI sweep entirely.
  #
  # 3 OSes × 3 Python versions = 9 jobs. Burning ~5 extra minutes of CI
  # is an acceptable price for "no broken Windows wheel ever ships."
  # Lint + type-check are deterministic across OSes, so we run them on
  # ubuntu-latest only — running 3× would dilute signal for zero gain.
  test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/sdk-python/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m ruff check src tests

      - name: Mypy
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python -m mypy

      - name: Pytest
        run: python -m pytest -q

  # Optional: hit the live API once before publishing. Always runs after
  # ``test`` (so ``needs: [test, live-smoke]`` on ``build`` flows
  # cleanly), but exits with 0 + a workflow warning when the
  # ``AGENTCHAT_LIVE_API_KEY`` secret isn't set — forks, fresh clones,
  # and TestPyPI dry-runs without the secret should never block a
  # legitimate publish. The unit suite is the hard gate.
  live-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/sdk-python/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Live smoke against api.agentchat.me
        env:
          AGENTCHAT_LIVE_API_KEY: ${{ secrets.AGENTCHAT_LIVE_API_KEY }}
        run: |
          if [ -z "$AGENTCHAT_LIVE_API_KEY" ]; then
            echo "::warning::AGENTCHAT_LIVE_API_KEY not set — skipping live smoke. Unit suite is the hard gate."
            exit 0
          fi
          python -m pytest -q tests/test_smoke_live.py

  build:
    runs-on: ubuntu-latest
    needs: [test, live-smoke]
    # live-smoke "skips with success" when the secret is missing, so we
    # always reach build after a green unit suite.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Show built artefacts
        run: ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/sdk-python/dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/agentchatme
    permissions:
      id-token: write  # OIDC for trusted publishing — required, no secret.
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # ``packages-dir`` is relative to the runner workspace, not the
          # ``defaults.run.working-directory`` we set for shell jobs.
          packages-dir: dist

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') }}
    environment:
      name: pypi
      url: https://pypi.org/p/agentchatme
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
